<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cric-View | Live Cricket Updates</title>


  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <div class="logo">
      <i class="fa-solid fa-fire-flame-curved"></i> Cric-View
    </div>

    <div class="nav-links">
      <a href="#" class="active">Live</a>
    </div>
  </header>


  <section class="hero">
    <h1>Live Cricket Scores & Updates</h1>
    <p>Get real-time match data, live scores, and schedules.</p>
  </section>


  <section class="controls">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search team..."
      >
    </div>


    <div class="filter-box">
      <select id="typeFilter">
        <option value="all">All Match Types</option>
        <option value="t20">T20</option>
        <option value="odi">ODI</option>
        <option value="test">Test</option>
      </select>
    </div>


    <button class="btn-refresh" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i>
      <span>Refresh</span>
    </button>

  </section>


  <main>
    <div id="matches" class="matches-grid">
      
    </div>
  </main>

  
  <footer>
    <p>&copy; 2026 Cric-View. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
